          <tr>
            <td style="padding:0; background-color:#ffffff;">
              <table width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td width="50%" valign="top" style="padding:0;">
                    <img src="{{ image_url }}"
                         alt="{{ image_alt }}"
                         width="330"
                         style="display:block; width:100%; max-width:330px; height:auto; border:0;" />
                  </td>
                  <td width="50%" valign="top" bgcolor="#3f4a4f" style="background-color:#3f4a4f; padding:38px 16px 15px 16px;">

                    <div style="height:6px; line-height:6px; font-size:6px;">&nbsp;</div>
                    <div style="font-family:Arial, sans-serif; font-size:18px; line-height:17px; color:#11a7c7; font-weight:700;">
                      {{ title }}
                    </div>
                    <div style="height:8px; line-height:8px; font-size:8px;">&nbsp;</div>
                    <div style="font-family:Arial, sans-serif; font-size:18px; line-height:17px; color:#ffffff;">
                      {{ description | safe }}
                    </div>
                    <div style="height:14px; line-height:14px; font-size:14px;">&nbsp;</div>
                    <table border="0" cellspacing="0" cellpadding="0">
                      <tr>
                        <td align="center" bgcolor="#003a5d" style="border-radius:20px;">
                          <a href="{{ button_url }}"
                             target="_blank"
                             style="display:inline-block; color:#ffffff; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; font-size:16px; text-decoration:none; padding:15px 45px; border-radius:20px;">
                            {{ button_text }}
                          </a>

                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
