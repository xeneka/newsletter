          <!-- SEPARADOR IMAGEN -->
          <tr>
            <td align="center" style="padding:{{ padding_top if padding_top else '0' }}px 0 {{ padding_bottom if padding_bottom else '0' }}px 0; background-color:#ffffff;">
              {% if link_url %}
              <a href="{{ link_url }}" target="_blank" style="display:block; border:0;">
              {% endif %}
              <img src="{{ image_url }}"
                   alt="{{ image_alt }}"
                   width="600"
                   style="display:block; width:100%; max-width:600px; height:auto; border:0;" />
              {% if link_url %}
              </a>
              {% endif %}
            </td>
          </tr>
